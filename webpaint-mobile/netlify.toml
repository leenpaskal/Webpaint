# Netlify config for the Expo web build.
#
# The build runner executes commands from the repo root (Netlify's "Current
# directory" is /opt/build/repo even when this file lives in a subfolder),
# and paths in this file are resolved relative to the repo root too.
# So we target the mobile workspace explicitly with `-w webpaint-mobile`
# and publish from `webpaint-mobile/dist`.

[build]
  # Build only the mobile workspace. Its `build` script is
  # `expo export --platform web`, which writes the static web bundle to
  # webpaint-mobile/dist.
  command = "npm run build -w webpaint-mobile"
  publish = "webpaint-mobile/dist"

[build.environment]
  # EXPO_PUBLIC_* env vars are inlined at bundle time, so this must be set
  # BEFORE the build runs (i.e. here, not in `.env` which is gitignored).
  EXPO_PUBLIC_API_BASE_URL = "https://webpaint-web.netlify.app/api"

# SPA fallback — only kicks in for paths Netlify can't match to a static
# file in dist/. Expo Router's static export emits one HTML file per
# route, so this is just a safety net for any client-only segments.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
